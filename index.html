<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>チェキポーズ</title>

<link rel="apple-touch-icon" href="icon.png">

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 40px;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}

#result {
  font-size: 32px;
  margin: 40px auto;
  padding: 30px;
  width: 80%;
  background: white;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

button {
  font-size: 18px;
  padding: 12px 24px;
  margin: 10px;
  border: none;
  border-radius: 30px;
  background: #ff6b81;
  color: white;
}

/* SSR演出 */
.ssr {
  animation: flash 0.5s infinite alternate;
  color: gold;
}

@keyframes flash {
  from { transform: scale(1); }
  to { transform: scale(1.2); }
}

/* フラッシュ */
.flash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  opacity: 0.8;
  animation: fade 0.5s forwards;
}

@keyframes fade {
  to { opacity: 0; }
}
</style>
</head>

<body>

<h1>📸 チェキポーズ</h1>

<div id="result">ボタンを押してね</div>

<button onclick="generatePose()">ポーズ生成</button>
<button onclick="generatePose()">もう一回</button>

<audio id="sound" src="ssr.mp3"></audio>

<script>
const poses = [
  // 王道（10）
  { text: "王道ハート", type: "normal" },
  { text: "ほっぺハート", type: "normal" },
  { text: "ダブルピース", type: "normal" },
  { text: "小顔ポーズ", type: "normal" },
  { text: "ウインク", type: "normal" },
  { text: "ほっぺツン", type: "normal" },
  { text: "にっこり笑顔", type: "normal" },
  { text: "あざといポーズ", type: "normal" },
  { text: "指ハート", type: "normal" },
  { text: "ほっぺぷく顔", type: "normal" },

  // 恋愛（8）
  { text: "カメラ見つめる（彼女感）", type: "normal" },
  { text: "投げキッス", type: "normal" },
  { text: "照れ顔", type: "normal" },
  { text: "内緒ポーズ", type: "normal" },
  { text: "上目遣い", type: "normal" },
  { text: "振り向き", type: "normal" },
  { text: "髪いじる仕草", type: "normal" },
  { text: "微笑み", type: "normal" },

  // ネタ（10）
  { text: "変顔", type: "normal" },
  { text: "驚き顔", type: "normal" },
  { text: "ドヤ顔", type: "normal" },
  { text: "泣きマネ", type: "normal" },
  { text: "ガチ真顔", type: "normal" },
  { text: "ほっぺ膨らませる", type: "normal" },
  { text: "イケメン風キメ顔", type: "normal" },
  { text: "変なポーズ（自由）", type: "normal" },
  { text: "決めポーズ（おまかせ）", type: "normal" },
  { text: "その場でアドリブ", type: "normal" },

  // SSR
  { text: "水飲んでるとこ", type: "ssr" },
  { text: "全力変顔", type: "ssr" }
];

function generatePose() {
  const result = document.getElementById("result");
  const sound = document.getElementById("sound");

  const isSSR = Math.random() < 0.07;

  let selected;

  if (isSSR) {
    const ssr = poses.filter(p => p.type === "ssr");
    selected = ssr[Math.floor(Math.random() * ssr.length)];

    result.classList.add("ssr");

    // 音
    sound.currentTime = 0;
    sound.play();

    // フラッシュ
    const flash = document.createElement("div");
    flash.className = "flash";
    document.body.appendChild(flash);

    setTimeout(() => flash.remove(), 500);

  } else {
    const normal = poses.filter(p => p.type === "normal");
    selected = normal[Math.floor(Math.random() * normal.length)];
    result.classList.remove("ssr");
  }

  result.textContent = selected.text;
}
</script>

</body>
</html>
