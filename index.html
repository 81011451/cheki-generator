<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>チェキポーズ</title>

<link rel="apple-touch-icon" href="icon.png">

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 40px;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}

#result {
  font-size: 32px;
  margin: 40px auto;
  padding: 30px;
  width: 80%;
  background: white;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

button {
  font-size: 18px;
  padding: 12px 24px;
  margin: 10px;
  border: none;
  border-radius: 30px;
  background: #ff6b81;
  color: white;
}

/* SSR演出 */
.ssr {
  animation: flash 0.5s infinite alternate;
  color: gold;
}

@keyframes flash {
  from { transform: scale(1); }
  to { transform: scale(1.2); }
}

/* フラッシュ */
.flash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  opacity: 0.8;
  animation: fade 0.5s forwards;
}

@keyframes fade {
  to { opacity: 0; }
}
</style>
</head>

<body>

<h1>📸 チェキポーズ</h1>

<div id="result">ボタンを押してね</div>

<button onclick="generatePose()">ポーズ生成</button>
<button onclick="generatePose()">もう一回</button>

<audio id="sound" src="ssr.mp3"></audio>

<script>
const poses = [/* ←さっきの30個入れる */];

function generatePose() {
  const result = document.getElementById("result");
  const sound = document.getElementById("sound");

  const isSSR = Math.random() < 0.07;

  let selected;

  if (isSSR) {
    const ssr = poses.filter(p => p.type === "ssr");
    selected = ssr[Math.floor(Math.random() * ssr.length)];

    result.classList.add("ssr");

    // 音
    sound.currentTime = 0;
    sound.play();

    // フラッシュ
    const flash = document.createElement("div");
    flash.className = "flash";
    document.body.appendChild(flash);

    setTimeout(() => flash.remove(), 500);

  } else {
    const normal = poses.filter(p => p.type === "normal");
    selected = normal[Math.floor(Math.random() * normal.length)];
    result.classList.remove("ssr");
  }

  result.textContent = selected.text;
}
</script>

</body>
</html>
